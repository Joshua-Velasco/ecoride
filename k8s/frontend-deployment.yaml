apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        env:
        - name: APP_ENV
          value: production
        - name: APP_DEBUG
          value: "true"
        - name: APP_KEY
          value: "base64:9lABnuckyZUO8F7yGnX48vhu+dNPdV8IZUfG9H/VaeM="
        - name: APP_URL
          value: http://ecoride.duckdns.org
        - name: SESSION_DRIVER
          value: file
        - name: CACHE_STORE
          value: file
        - name: KEYCLOAK_BASE_URL
          value: http://ecoride.duckdns.org:30005
        - name: KEYCLOAK_REALM
          value: ecoride
        - name: KEYCLOAK_REDIRECT_URI
          value: http://ecoride.duckdns.org/login/callback
        - name: KEYCLOAK_CLIENT_ID
          value: ecoride-app
        - name: KEYCLOAK_CLIENT_SECRET
          value: ecoride-client-secret-123456
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app: frontend
